<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-md bg-white shadow-xl rounded-xl p-8">

    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Connexion
    </h1>
    <!-- Message d'erreur -->
    <div *ngIf="errorMessage()" 
         class="bg-red-100 text-red-700 px-4 py-2 mb-4 rounded">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-4">

      <div>
        <label class="text-gray-700 font-medium">Email</label>
        <input type="email" formControlName="email"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="text-gray-700 font-medium">Mot de passe</label>
        <input type="password" formControlName="password"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50">
        <span >Se connecter</span>
        <span *ngIf="loading()">Connexion...</span>
      </button>
    </form>

    <div class="text-center mt-4">
      <a routerLink="/forgot-password" class="text-blue-600 hover:underline">
        Mot de passe oublié ?
      </a>
    </div>

  </div>
</div>
