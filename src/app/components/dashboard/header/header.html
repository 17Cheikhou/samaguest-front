<nav class="bg-gradient-to-r from-white to-blue-50/30 backdrop-blur-sm border-b border-blue-100/50 px-6 py-4 sticky top-0 z-50 shadow-sm">
  <div class="flex items-center justify-between max-w-[1920px] mx-auto">
    <!-- Partie gauche -->
    <div class="flex items-center gap-6">
      <!-- Bouton menu mobile -->
      <button 
        (click)="toggleMobileMenu()"
        class="p-2.5 rounded-xl hover:bg-blue-50 active:scale-95 transition-all duration-200 lg:hidden group"
        aria-label="Menu mobile">
        <svg class="w-6 h-6 text-gray-700 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            stroke-width="2"
            [attr.d]="mobileMenuOpen() ? 
              'M6 18L18 6M6 6l12 12' : 
              'M4 6h16M4 12h16M4 18h16'"/>
        </svg>
      </button>

      <!-- Logo et titre -->
      <div class="flex items-center gap-3">
        <div class="hidden sm:flex items-center gap-3">
          <!-- Logo avec gradient -->
          <div class="relative">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30 transform hover:scale-105 transition-transform duration-200">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
              </svg>
            </div>
            <!-- Badge en ligne -->
            <div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white animate-pulse"></div>
          </div>
          
          <div>
            <div class="text-xl font-bold bg-gradient-to-r from-blue-700 to-blue-600 bg-clip-text text-transparent">
              SamaGestPharma
            </div>
            <div class="flex items-center gap-2 text-xs text-gray-500">
              <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="font-medium">{{ currentTime() }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Partie droite -->
    <div class="flex items-center gap-3">
      <!-- Barre de recherche rapide (desktop) -->
      <div class="hidden md:flex items-center gap-2 bg-white/80 backdrop-blur-sm border border-gray-200 rounded-xl px-4 py-2 hover:border-blue-300 transition-colors duration-200 min-w-[280px]">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input 
          type="text" 
          placeholder="Rechercher..." 
          class="bg-transparent border-none outline-none text-sm text-gray-700 placeholder-gray-400 w-full"
        />
        <kbd class="hidden xl:inline-flex items-center gap-1 px-2 py-1 text-xs font-medium text-gray-500 bg-gray-100 rounded border border-gray-200">
          ⌘K
        </kbd>
      </div>

      <!-- Notifications -->
      <button class="relative p-2.5 rounded-xl hover:bg-blue-50 transition-all duration-200 group active:scale-95">
        <svg class="w-5 h-5 text-gray-600 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <!-- Badge notification avec animation -->
        <span class="absolute top-1.5 right-1.5 flex h-4 w-4">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
          <span class="relative inline-flex items-center justify-center rounded-full h-4 w-4 bg-red-500 text-white text-[10px] font-bold">3</span>
        </span>
      </button>

      <!-- Séparateur vertical -->
      <div class="hidden sm:block h-8 w-px bg-gradient-to-b from-transparent via-gray-300 to-transparent"></div>

      <!-- Utilisateur -->
      <div class="flex items-center gap-3">
        <!-- Info utilisateur (desktop) -->
        <div class="hidden sm:block text-right">
          <div class="text-sm font-medium text-gray-800">
            {{ user()?.name }}
          </div>
          <div class="flex items-center justify-end gap-1.5">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700 border border-blue-200">
              {{ user()?.role.name }}
            </span>
          </div>
        </div>

        <!-- Avatar et menu déroulant -->
        <div class="relative">
          <button 
            (click)="toggleProfileMenu()" 
            class="flex items-center gap-2 p-1.5 rounded-xl hover:bg-blue-50 transition-all duration-200 active:scale-95 group">
            @if (user()?.avatar) {
              <img [src]="user()?.avatar" 
                   alt="Avatar" 
                   class="w-10 h-10 rounded-xl border-2 border-white shadow-md object-cover group-hover:border-blue-300 transition-colors"/>
            } @else {
              <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-md group-hover:shadow-lg transition-shadow">
                {{ user()?.name?.charAt(0) || 'U' }}
              </div>
            }
            <svg class="w-4 h-4 text-gray-500 group-hover:text-blue-600 transition-colors hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Menu déroulant avec animation -->
          <div 
            [class.opacity-100]="profileMenuOpen()" 
            [class.visible]="profileMenuOpen()"
            [class.scale-100]="profileMenuOpen()"
            [class.translate-y-0]="profileMenuOpen()"
            class="absolute right-0 mt-3 w-64 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl border border-gray-200 
                   opacity-0 invisible scale-95 translate-y-2
                   transition-all duration-200 z-50 overflow-hidden">
            
            <!-- Header du menu -->
            <div class="p-4 bg-gradient-to-br from-blue-50 to-white border-b border-gray-100">
              <div class="flex items-center gap-3">
                @if (user()?.avatar) {
                  <img [src]="user()?.avatar" 
                       alt="Avatar" 
                       class="w-12 h-12 rounded-xl border-2 border-white shadow-md object-cover"/>
                } @else {
                  <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold shadow-md">
                    {{ user()?.name?.charAt(0) || 'U' }}
                  </div>
                }
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-gray-900 truncate">{{ user()?.name }}</div>
                  <div class="text-xs text-gray-500 truncate">{{ user()?.email }}</div>
                </div>
              </div>
            </div>
            
            <!-- Items du menu -->
            <div class="p-2">
              <a (click)="navigateToProfile()" 
                 class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-blue-50 rounded-xl cursor-pointer transition-all duration-150 group">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center group-hover:bg-blue-200 transition-colors">
                  <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                  </svg>
                </div>
                <span class="font-medium">Mon profil</span>
              </a>
              
              <a class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-blue-50 rounded-xl cursor-pointer transition-all duration-150 group">
                <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center group-hover:bg-gray-200 transition-colors">
                  <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </div>
                <span class="font-medium">Paramètres</span>
              </a>

              <div class="my-2 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>
              
              <button (click)="logout()"
                      class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-xl transition-all duration-150 group">
                <div class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center group-hover:bg-red-200 transition-colors">
                  <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                  </svg>
                </div>
                <span class="font-semibold">Déconnexion</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
