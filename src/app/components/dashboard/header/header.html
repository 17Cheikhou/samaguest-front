<nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-b border-slate-200 shadow-sm z-[100]">
  <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Partie gauche -->
      <div class="flex items-center gap-4">
        <!-- Bouton menu mobile -->
        <button 
          (click)="toggleMobileMenu()"
          class="lg:hidden p-2 rounded-xl hover:bg-blue-50 active:scale-95 transition-all duration-200 group"
          aria-label="Menu mobile">
          <svg class="w-6 h-6 text-slate-700 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              stroke-width="2"
              [attr.d]="mobileMenuOpen() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'"/>
          </svg>
        </button>

        <!-- Logo et titre -->
        <div class="flex items-center gap-3">
          <div class="relative group cursor-pointer">
            <!-- Logo avec animation -->
            <div class="w-10 h-10 sm:w-11 sm:h-11 bg-gradient-to-br from-blue-600 via-blue-700 to-blue-800 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30 group-hover:shadow-xl group-hover:shadow-blue-600/40 transition-all duration-300 group-hover:scale-105">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
              </svg>
            </div>
            <!-- Badge en ligne -->
            <div class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white animate-pulse shadow-lg"></div>
          </div>
          
          <div class="hidden sm:block">
            <h1 class="text-lg sm:text-xl font-bold bg-gradient-to-r from-blue-700 via-blue-600 to-blue-700 bg-clip-text text-transparent tracking-tight">
              SamaGestPharma
            </h1>
            <div class="flex items-center gap-1.5 mt-0.5">
              <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
              <span class="text-xs font-medium text-slate-500">{{ currentTime() }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Partie droite -->
      <div class="flex items-center gap-3">
        <!-- Notifications -->
        <button class="relative p-2.5 rounded-xl hover:bg-blue-50 transition-all duration-200 group active:scale-95">
          <svg class="w-5 h-5 text-slate-600 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <!-- Badge notification animé -->
          <span class="absolute top-1.5 right-1.5 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex items-center justify-center rounded-full h-4 w-4 bg-gradient-to-br from-red-500 to-red-600 text-white text-[10px] font-bold shadow-lg">3</span>
          </span>
        </button>

        <!-- Séparateur vertical -->
        <div class="hidden sm:block h-8 w-px bg-gradient-to-b from-transparent via-slate-300 to-transparent"></div>

        <!-- Section Utilisateur -->
        <div class="flex items-center gap-3">
          <!-- Info utilisateur (desktop) -->
          <div class="hidden md:block text-right">
            <div class="text-sm font-semibold text-slate-900">
              {{ user()?.name }}
            </div>
            <div class="flex items-center justify-end gap-1.5 mt-0.5">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gradient-to-r from-blue-50 to-blue-100 text-blue-700 border border-blue-200">
                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
                {{ user()?.role.name }}
              </span>
            </div>
          </div>

          <!-- Avatar et menu déroulant -->
          <div class="relative profile-menu-container">
            <button 
              (click)="toggleProfileMenu($event)" 
              class="flex items-center gap-2 p-1.5 rounded-xl hover:bg-blue-50 transition-all duration-200 active:scale-95 group">
              @if (user()?.avatar) {
                <img [src]="user()?.avatar" 
                     alt="Avatar" 
                     class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border-2 border-white shadow-md object-cover group-hover:border-blue-300 transition-all duration-200"/>
              } @else {
                <div class="w-9 h-9 sm:w-10 sm:h-10 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-md group-hover:shadow-lg group-hover:scale-105 transition-all duration-200">
                  {{ getUserInitials() }}
                </div>
              }
              <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-600 transition-colors hidden sm:block" 
                   [class.rotate-180]="profileMenuOpen()"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>

            <!-- Menu déroulant avec z-index supérieur -->
            <div 
              [class.opacity-100]="profileMenuOpen()" 
              [class.visible]="profileMenuOpen()"
              [class.scale-100]="profileMenuOpen()"
              [class.translate-y-0]="profileMenuOpen()"
              class="absolute right-0 mt-2 w-72 bg-white rounded-2xl shadow-2xl border border-slate-200 
                     opacity-0 invisible scale-95 -translate-y-2
                     transition-all duration-200 z-[200] overflow-hidden">
              
              <!-- Header du menu avec gradient -->
              <div class="relative p-5 bg-gradient-to-br from-blue-50 via-white to-blue-50/50 border-b border-slate-100">
                <div class="flex items-center gap-3">
                  @if (user()?.avatar) {
                    <img [src]="user()?.avatar" 
                         alt="Avatar" 
                         class="w-14 h-14 rounded-xl border-2 border-white shadow-lg object-cover"/>
                  } @else {
                    <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg">
                      {{ getUserInitials() }}
                    </div>
                  }
                  <div class="flex-1 min-w-0">
                    <div class="font-bold text-slate-900 truncate text-base">{{ user()?.name }}</div>
                    <div class="text-xs text-slate-500 truncate mt-0.5">{{ user()?.email }}</div>
                    <div class="mt-2">
                      <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gradient-to-r from-blue-100 to-blue-200 text-blue-700">
                        {{ user()?.role.name }}
                      </span>
                    </div>
                  </div>
                </div>
              </div>
              
              <!-- Items du menu -->
              <div class="p-2">
                <button 
                  (click)="navigateToProfile()" 
                  class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 rounded-xl transition-all duration-150 group">
                  <div class="w-9 h-9 bg-gradient-to-br from-blue-100 to-blue-200 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                  </div>
                  <span class="font-semibold">Mon profil</span>
                  <svg class="w-4 h-4 ml-auto text-slate-400 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                  </svg>
                </button>
                
                <button 
                  class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 rounded-xl transition-all duration-150 group">
                  <div class="w-9 h-9 bg-gradient-to-br from-slate-100 to-slate-200 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                  </div>
                  <span class="font-semibold">Paramètres</span>
                  <svg class="w-4 h-4 ml-auto text-slate-400 group-hover:text-slate-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                  </svg>
                </button>

                <div class="my-2 h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
                
                <button 
                  (click)="logout()"
                  class="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-600 hover:bg-red-50 rounded-xl transition-all duration-150 group">
                  <div class="w-9 h-9 bg-gradient-to-br from-red-100 to-red-200 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                  </div>
                  <span class="font-bold">Déconnexion</span>
                  <svg class="w-4 h-4 ml-auto text-red-400 group-hover:text-red-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Spacer pour compenser le header fixe -->
<div class="h-16"></div>
